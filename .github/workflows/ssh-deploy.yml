name: CI/CD Deploy Pipeline

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_SSH_FOLDER: ${{ vars.SSH_FOLDER }}
  PROD_NAME: ${{ vars.PROD_NAME }}

jobs:
  deploy:
    name: 'Publish to VPS'
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: 'Execute Remote Commands'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ vars.SSH_PORT }}
          script: |
            cd ${{ env.PROJECT_SSH_FOLDER }}

            echo "${{ secrets.DOCKER_HUB_TOKEN }}" | docker login -u ${{ secrets.DOCKER_HUB_USERNAME }} --password-stdin

            IS_BACKEND="${{ contains(github.event.pull_request.labels.*.name, 'backend') }}"
            IS_WEBSITE="${{ contains(github.event.pull_request.labels.*.name, 'website') }}"
            IS_ADMIN="${{ contains(github.event.pull_request.labels.*.name, 'admin') }}"

            SERVICES=""
            if [ "$IS_BACKEND" == "true" ]; then
                SERVICES="$SERVICES server"
            fi
            if [ "$IS_WEBSITE" == "true" ]; then
                SERVICES="$SERVICES website"
            fi
            if [ "$IS_ADMIN" == "true" ]; then
                SERVICES="$SERVICES admin"
            fi

            if [ ! -z "$SERVICES" ]; then
                echo "🚀 Updating services:$SERVICES"
                docker compose -f docker-compose.prod-ci.yml -p ${{ env.PROD_NAME }} pull $SERVICES
                docker compose -f docker-compose.prod-ci.yml -p ${{ env.PROD_NAME }} up -d --no-deps $SERVICES
            else
                echo "⚠️ No relevant labels found. Updating entire stack..."
                docker compose -f docker-compose.prod-ci.yml -p ${{ env.PROD_NAME }} pull
                docker compose -f docker-compose.prod-ci.yml -p ${{ env.PROD_NAME }} up -d --remove-orphans
            fi

            docker image prune -f
