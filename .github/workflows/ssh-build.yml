name: CI/CD Build Pipeline

on:
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

env:
  DOCKER_USER: ${{ secrets.DOCKER_HUB_USERNAME }}
  PROD_NAME: ${{ vars.PROD_NAME }}
  SERVER_DOMAIN: ${{ vars.SERVER_DOMAIN }}
  ADMIN_DOMAIN: ${{ vars.ADMIN_DOMAIN }}
  WEBSITE_DOMAIN: ${{ vars.WEBSITE_DOMAIN }}

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Login to Docker Hub'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 'Build & Push Server'
        if: contains(github.event.pull_request.labels.*.name, 'backend')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.PROD_NAME }}-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_MODE=production

      - name: 'Build & Push Website'
        if: contains(github.event.pull_request.labels.*.name, 'website')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/website/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.PROD_NAME }}-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_MODE=production
            APP_HOSTNAME=${{ env.WEBSITE_DOMAIN }}
            NEXT_PUBLIC_APP_DOMAIN=${{ env.WEBSITE_DOMAIN }}
            NEXT_PUBLIC_ADMIN_DOMAIN=${{ env.ADMIN_DOMAIN }}
            NEXT_PUBLIC_SERVER_DOMAIN=${{ env.SERVER_DOMAIN }}

      - name: 'Build & Push Admin'
        if: contains(github.event.pull_request.labels.*.name, 'admin')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin/Dockerfile
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.PROD_NAME }}-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_MODE=production
            APP_HOSTNAME=${{ env.ADMIN_DOMAIN }}
            NEXT_PUBLIC_APP_DOMAIN=${{ env.ADMIN_DOMAIN }}
            NEXT_PUBLIC_WEBSITE_DOMAIN=${{ env.WEBSITE_DOMAIN }}
            NEXT_PUBLIC_SERVER_DOMAIN=${{ env.SERVER_DOMAIN }}
